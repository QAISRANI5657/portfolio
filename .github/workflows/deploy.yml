name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /portfolio
          NEXT_PUBLIC_SITE_URL: https://qaisrani5657.github.io/portfolio
          NEXT_PUBLIC_GITHUB_URL: https://github.com/QAISRANI5657
          NEXT_PUBLIC_LINKEDIN_URL: https://www.linkedin.com/in/muhammad-saran-muslim
          NEXT_PUBLIC_EMAIL: qaisrani5657@gmail.com
          NEXT_PUBLIC_WHATSAPP_URL: https://wa.me/923363458484?text=Hi%2C%20I%27d%20like%20to%20discuss%20a%20project

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
